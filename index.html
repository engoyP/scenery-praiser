<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>景色赞美器</title>
<style>
/* ========== CSS 变量：日夜主题 ========== */
:root {
  /* 白天默认 */
  --sky-top: #4facfe;
  --sky-bottom: #f0f9ff;
  --sun-color: #ffd700;
  --sun-glow: rgba(255, 215, 0, 0.4);
  --cloud-color: rgba(255, 255, 255, 0.85);
  --mountain-far: #8ba888;
  --mountain-mid: #6b9a6e;
  --mountain-near: #4a7c59;
  --grass-color: #7cb342;
  --grass-dark: #558b2f;
  --particle-color: rgba(255, 215, 100, 0.6);
  --particle-size: 3px;
  --card-bg: rgba(255, 255, 255, 0.22);
  --card-border: rgba(255, 255, 255, 0.35);
  --text-color: #2c2416;
  --text-muted: #5c4d3a;
  --accent: #d97706;
  --accent2: #7c3aed;
  --btn-bg: linear-gradient(135deg, #f59e0b, #d97706);
  --btn-shadow: rgba(217, 119, 6, 0.35);
  --glow-color: rgba(245, 158, 11, 0.25);
  --orbit-color: rgba(255, 255, 255, 0.4);
}

[data-theme="night"] {
  --sky-top: #0a0e27;
  --sky-bottom: #1a1a40;
  --sun-color: #e8e8e8;
  --sun-glow: rgba(232, 232, 232, 0.25);
  --cloud-color: rgba(200, 210, 230, 0.2);
  --mountain-far: #1a2744;
  --mountain-mid: #152238;
  --mountain-near: #0f1929;
  --grass-color: #1a3a1a;
  --grass-dark: #0f250f;
  --particle-color: rgba(163, 230, 53, 0.7);
  --particle-size: 4px;
  --card-bg: rgba(0, 0, 0, 0.22);
  --card-border: rgba(255, 255, 255, 0.12);
  --text-color: #e2e8f0;
  --text-muted: #a0aec0;
  --accent: #818cf8;
  --accent2: #c084fc;
  --btn-bg: linear-gradient(135deg, #6366f1, #8b5cf6);
  --btn-shadow: rgba(99, 102, 241, 0.35);
  --glow-color: rgba(129, 140, 248, 0.25);
  --orbit-color: rgba(200, 200, 255, 0.15);
}

/* ========== 基础重置 ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Source Han Serif SC", "Noto Serif SC", Georgia, serif;
  color: var(--text-color);
  overflow-x: hidden;
  min-height: 100vh;
  transition: color 1.2s ease;
}

/* ========== 背景风景层 ========== */
.landscape {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
  transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* 太阳 / 月亮 */
.celestial {
  position: absolute;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, var(--sun-color), transparent 70%);
  box-shadow: 0 0 60px 20px var(--sun-glow), 0 0 120px 40px var(--sun-glow);
  top: 8%; right: 15%;
  transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
}
[data-theme="night"] .celestial {
  width: 60px; height: 60px;
  background: radial-gradient(circle at 30% 30%, #f0f0f0, #c0c0c0);
  box-shadow: 0 0 40px 10px rgba(200, 200, 220, 0.3), 0 0 80px 20px rgba(200, 200, 220, 0.15);
  border-radius: 50%;
  /* 弯月效果 */
  box-shadow: inset -8px -4px 0 0 #0a0e27, 0 0 40px 10px rgba(200,200,220,0.2);
}

/* 星星（仅夜间） */
.stars {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.5s ease;
  z-index: 1;
}
[data-theme="night"] .stars { opacity: 1; }
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* 云朵 */
.cloud {
  position: absolute;
  background: var(--cloud-color);
  border-radius: 50px;
  transition: background 1.5s ease;
  z-index: 2;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: inherit;
  border-radius: 50%;
}
.cloud1 { width: 120px; height: 40px; top: 12%; left: 10%; animation: float1 25s linear infinite; }
.cloud1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
.cloud1::after { width: 40px; height: 40px; top: -15px; left: 50px; }
.cloud2 { width: 100px; height: 35px; top: 20%; left: 60%; animation: float2 30s linear infinite; }
.cloud2::before { width: 45px; height: 45px; top: -22px; left: 12px; }
.cloud2::after { width: 35px; height: 35px; top: -12px; left: 45px; }
.cloud3 { width: 140px; height: 45px; top: 8%; left: 75%; animation: float1 35s linear infinite reverse; }
.cloud3::before { width: 55px; height: 55px; top: -28px; left: 20px; }
.cloud3::after { width: 45px; height: 45px; top: -18px; left: 60px; }
@keyframes float1 { 0% { transform: translateX(-50px); } 50% { transform: translateX(50px); } 100% { transform: translateX(-50px); } }
@keyframes float2 { 0% { transform: translateX(30px); } 50% { transform: translateX(-40px); } 100% { transform: translateX(30px); } }

/* 远山（三层视差） */
.mountain {
  position: absolute;
  bottom: 0;
  width: 100%;
  transition: all 1.5s ease;
}
.mountain-far {
  height: 35%;
  background: linear-gradient(135deg, var(--mountain-far) 0%, transparent 100%);
  clip-path: polygon(0% 100%, 0% 40%, 15% 20%, 30% 45%, 45% 15%, 60% 40%, 75% 10%, 90% 35%, 100% 25%, 100% 100%);
  z-index: 3;
  opacity: 0.7;
}
.mountain-mid {
  height: 28%;
  background: linear-gradient(135deg, var(--mountain-mid) 0%, transparent 100%);
  clip-path: polygon(0% 100%, 0% 55%, 20% 30%, 35% 50%, 50% 25%, 65% 45%, 80% 20%, 100% 40%, 100% 100%);
  z-index: 4;
  opacity: 0.85;
}
.mountain-near {
  height: 20%;
  background: linear-gradient(135deg, var(--mountain-near) 0%, transparent 100%);
  clip-path: polygon(0% 100%, 0% 60%, 25% 35%, 40% 55%, 55% 30%, 70% 50%, 85% 25%, 100% 45%, 100% 100%);
  z-index: 5;
}

/* 草地 */
.grass {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 12%;
  background: linear-gradient(180deg, var(--grass-color) 0%, var(--grass-dark) 100%);
  z-index: 6;
  transition: all 1.5s ease;
}

/* 装饰漂浮元素 */
.orb {
  position: absolute;
  border-radius: 50%;
  background: var(--orbit-color);
  animation: orbFloat 8s ease-in-out infinite;
  z-index: 2;
}
.orb1 { width: 60px; height: 60px; top: 15%; left: 5%; animation-delay: 0s; }
.orb2 { width: 40px; height: 40px; top: 60%; left: 85%; animation-delay: 2s; }
.orb3 { width: 80px; height: 80px; top: 70%; left: 20%; animation-delay: 4s; opacity: 0.5; }
.orb4 { width: 30px; height: 30px; top: 30%; left: 70%; animation-delay: 1s; }
.orb5 { width: 50px; height: 50px; top: 45%; left: 45%; animation-delay: 3s; }
.orb6 { width: 35px; height: 35px; top: 80%; left: 60%; animation-delay: 5s; }
@keyframes orbFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* ========== Canvas 粒子层 ========== */
#particleCanvas {
  position: fixed;
  inset: 0;
  z-index: 7;
  pointer-events: none;
}

/* ========== 鼠标拖尾容器 ========== */
#trailContainer {
  position: fixed;
  inset: 0;
  z-index: 8;
  pointer-events: none;
}
.trail-dot {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: trailFade 1.5s ease-out forwards;
}
@keyframes trailFade {
  0% { opacity: 0.6; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.3); }
}

/* ========== 视差层 ========== */
.parallax-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  transition: transform 0.3s ease-out;
}

/* ========== UI 容器 ========== */
.ui-container {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

/* ========== 标题 ========== */
.title-section {
  text-align: center;
  margin-bottom: 1.5rem;
}
.title-section h1 {
  font-size: 2.4rem;
  font-weight: 800;
  background: linear-gradient(120deg, var(--accent), var(--accent2));
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 3s ease infinite;
  letter-spacing: -0.02em;
}
@keyframes gradientShift {
  0%, 100% { background-position: 0% center; }
  50% { background-position: 100% center; }
}
.title-section .subtitle {
  font-size: 1rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
  font-style: italic;
}

/* ========== 毛玻璃卡片 ========== */
.glass-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 1.5rem 2rem;
  width: 100%;
  max-width: 640px;
  margin-bottom: 1rem;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  transition: all 1.2s ease;
}

/* ========== 输入框 ========== */
.input-area textarea {
  width: 100%;
  min-height: 60px;
  padding: 12px 16px;
  border: 1px solid var(--card-border);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-color);
  font-size: 1rem;
  font-family: inherit;
  resize: vertical;
  outline: none;
  transition: all 0.3s ease;
}
.input-area textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow-color);
}
.input-area textarea::placeholder { color: var(--text-muted); opacity: 0.7; }

/* ========== 心境选择器 ========== */
.mood-selector { margin: 1rem 0; }
.mood-selector-label {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 0.6rem;
  display: block;
}
.mood-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  position: relative;
}
.mood-btn {
  position: relative;
  padding: 8px 16px;
  border: 1px solid var(--card-border);
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-color);
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}
.mood-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
.mood-btn.active {
  background: var(--btn-bg);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 15px var(--btn-shadow);
}
.mood-icon {
  width: 16px; height: 16px;
  display: inline-block;
  position: relative;
}
/* 愉悦 - 太阳 */
.mood-icon.sun::before {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 50%;
  background: currentColor;
}
/* 希望 - 星星 */
.mood-icon.star { clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
/* 宁静 - 叶子 */
.mood-icon.leaf { border-radius: 0 50% 0 50%; background: currentColor; }
/* 感伤 - 雨滴 */
.mood-icon.raindrop { border-radius: 50% 50% 50% 0; background: currentColor; transform: rotate(-45deg); }
/* 迷茫 - 云雾 */
.mood-icon.cloud-icon { border-radius: 50%; background: currentColor; opacity: 0.6; }
.mood-icon.cloud-icon::after {
  content: '';
  position: absolute;
  left: 6px; top: 4px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.5;
}
/* 震撼 - 闪电 */
.mood-icon.bolt {
  clip-path: polygon(60% 0%, 40% 40%, 70% 40%, 30% 100%, 50% 50%, 20% 50%);
  background: currentColor;
}

/* ========== 风格选择器 ========== */
.style-selector { margin: 1rem 0; }
.style-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.style-btn {
  padding: 8px 18px;
  border: 1px solid var(--card-border);
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-color);
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.style-btn:hover { background: rgba(255, 255, 255, 0.15); }
.style-btn.active {
  background: var(--btn-bg);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 15px var(--btn-shadow);
}

/* ========== 生成按钮 ========== */
.generate-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: var(--btn-bg);
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  margin-top: 0.5rem;
}
.generate-btn:hover {
  transform: scale(1.02);
  box-shadow: 0 8px 25px var(--btn-shadow);
}
.generate-btn:active { transform: scale(0.98); }
/* 流光边框 */
.generate-btn::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 16px;
  background: conic-gradient(from var(--angle, 0deg), var(--accent), var(--accent2), var(--accent));
  z-index: -1;
  animation: rotateBorder 4s linear infinite;
  opacity: 0.6;
}
@property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
@keyframes rotateBorder { to { --angle: 360deg; } }

/* 水波纹 */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.4);
  transform: scale(0);
  animation: rippleAnim 0.6s ease-out forwards;
  pointer-events: none;
}
@keyframes rippleAnim {
  to { transform: scale(4); opacity: 0; }
}

/* ========== 输出区域 ========== */
.output-area {
  margin-top: 1rem;
  min-height: 80px;
}
.output-placeholder {
  color: var(--text-muted);
  font-size: 0.9rem;
  text-align: center;
  padding: 1.5rem;
  opacity: 0.6;
}
.output-text {
  font-size: 1.1rem;
  line-height: 1.9;
  color: var(--text-color);
  white-space: pre-wrap;
  word-break: break-word;
}
.output-text .cursor {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: var(--accent);
  margin-left: 2px;
  animation: blink 0.8s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink { 50% { opacity: 0; } }

/* 呼吸光晕 */
.output-area.has-result {
  animation: breatheGlow 3s ease-in-out infinite;
}
@keyframes breatheGlow {
  0%, 100% { box-shadow: 0 0 10px var(--glow-color); }
  50% { box-shadow: 0 0 30px var(--glow-color), 0 0 60px var(--glow-color); }
}

/* ========== 操作按钮行 ========== */
.action-row {
  display: flex;
  gap: 10px;
  margin-top: 1rem;
  justify-content: center;
}
.action-btn {
  padding: 8px 20px;
  border: 1px solid var(--card-border);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-muted);
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s ease;
}
.action-btn:hover {
  background: rgba(255, 255, 255, 0.15);
  color: var(--text-color);
}

/* ========== 日夜切换按钮 ========== */
.theme-toggle {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  color: var(--text-color);
  font-size: 1.2rem;
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.5s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}
.theme-toggle:hover {
  transform: scale(1.1) rotate(15deg);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
}
/* CSS 太阳图标 */
.theme-toggle .sun-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  position: relative;
}
.theme-toggle .sun-icon::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px dotted var(--accent);
  opacity: 0.5;
}
/* CSS 月亮图标 */
.theme-toggle .moon-icon {
  width: 20px; height: 20px;
  border-radius: 50%;
  box-shadow: inset -5px -2px 0 0 var(--accent);
}

/* ========== 加载动画 ========== */
.loading-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  padding: 1.5rem;
}
.loading-dots span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: dotBounce 1.4s ease-in-out infinite both;
}
.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* ========== 响应式 ========== */
@media (max-width: 600px) {
  .title-section h1 { font-size: 1.8rem; }
  .glass-card { padding: 1.2rem 1rem; }
  .mood-buttons, .style-buttons { justify-content: center; }
  .theme-toggle { bottom: 20px; right: 20px; width: 44px; height: 44px; }
}
</style>
</head>
<body data-theme="day">

<!-- ========== 背景风景 ========== -->
<div class="landscape" id="landscape">
  <div class="celestial" id="celestial"></div>
  <div class="stars" id="stars"></div>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
  <div class="orb orb5"></div>
  <div class="orb orb6"></div>
  <div class="mountain mountain-far parallax-layer" data-speed="0.02"></div>
  <div class="mountain mountain-mid parallax-layer" data-speed="0.05"></div>
  <div class="mountain mountain-near parallax-layer" data-speed="0.1"></div>
  <div class="grass parallax-layer" data-speed="0.15"></div>
</div>

<!-- ========== Canvas 粒子 ========== -->
<canvas id="particleCanvas"></canvas>

<!-- ========== 鼠标拖尾 ========== -->
<div id="trailContainer"></div>

<!-- ========== UI ========== -->
<div class="ui-container">

  <div class="title-section">
    <h1>景色赞美器</h1>
    <p class="subtitle">世界很大，你看见的美，值得被好好赞美</p>
  </div>

  <div class="glass-card input-area">
    <textarea id="sceneInput" placeholder="描述你当前所处的环境，比如：我在海边看日落..."></textarea>

    <div class="mood-selector">
      <span class="mood-selector-label">选择你当下的心境</span>
      <div class="mood-buttons" id="moodButtons">
        <button class="mood-btn active" data-mood="愉悦">
          <span class="mood-icon sun"></span>愉悦
        </button>
        <button class="mood-btn" data-mood="希望">
          <span class="mood-icon star"></span>希望
        </button>
        <button class="mood-btn" data-mood="宁静">
          <span class="mood-icon leaf"></span>宁静
        </button>
        <button class="mood-btn" data-mood="感伤">
          <span class="mood-icon raindrop"></span>感伤
        </button>
        <button class="mood-btn" data-mood="迷茫">
          <span class="mood-icon cloud-icon"></span>迷茫
        </button>
        <button class="mood-btn" data-mood="震撼">
          <span class="mood-icon bolt"></span>震撼
        </button>
      </div>
    </div>

    <div class="style-selector">
      <span class="mood-selector-label">选择输出风格</span>
      <div class="style-buttons" id="styleButtons">
        <button class="style-btn active" data-style="一句话">一句话</button>
        <button class="style-btn" data-style="一句诗">一句诗</button>
        <button class="style-btn" data-style="一段话">一段话</button>
        <button class="style-btn" data-style="自由发挥">自由发挥</button>
      </div>
    </div>

    <button class="generate-btn" id="generateBtn">生成赞美</button>
  </div>

// ==================== 场景关键词映射 ====================
const SCENE_MAP = {
  sea: ['海', '浪', '沙滩', '海岸', '海边', '海洋', '潮汐', '涛', '蔚蓝', '碧海'],
  mountain: ['山', '峰', '岭', '崖', '峦', '顶', '登高', '林', '森林', '树木', '松', '竹'],
  city: ['城', '街', '楼', '灯', '霓虹', '大厦', '街道', '建筑', '都市'],
  countryside: ['田', '村', '麦', '农庄', '田园', '稻', '农', '牧场'],
  snow: ['雪', '冰', '冬', '寒', '白', '霜', '冻'],
  desert: ['沙漠', '沙', '戈壁', '荒', '沙丘'],
  flower: ['花', '樱花', '桃花', '牡丹', '玫瑰', '郁金香', '花海', '花园'],
  lake: ['湖', '泊', '池', '潭', '水面', '湖畔', '湖边'],
  grassland: ['草原', '草', '牧', '野', '草地', '草坪'],
  star: ['星空', '星', '银河', '夜空', '宇宙', '星辰', '银河'],
  sunrise: ['日出', '朝阳', '晨光', '破晓', '黎明'],
  sunset: ['日落', '夕阳', '晚霞', '黄昏', '暮色'],
  rain: ['雨', '雨声', '细雨', '梅雨', '雨滴']
};

// 根据输入判断场景
function detectScene(input) {
  for (const [scene, keywords] of Object.entries(SCENE_MAP)) {
    if (keywords.some(k => input.includes(k))) return scene;
  }
  return 'default';
}

// 获取模板
function getTemplate(scene, mood, style) {
  const sceneData = TEMPLATES[scene] || TEMPLATES.default;
  const moodData = sceneData[mood] || TEMPLATES.default[mood];
  if (!moodData) return null;

  let styleData;
  if (style === '自由发挥') {
    const rand = Math.random();
    if (rand < 0.33) styleData = moodData['一句话'];
    else if (rand < 0.66) styleData = moodData['一句诗'];
    else styleData = moodData['一段话'];
  } else {
    styleData = moodData[style] || moodData['一句话'];
  }

  if (!styleData || styleData.length === 0) return null;
  return styleData[Math.floor(Math.random() * styleData.length)];
}

// ==================== 打字机效果 ====================
function typeWriter(text, element, speed = 50) {
  return new Promise(resolve => {
    isTyping = true;
    element.innerHTML = '<span class="cursor"></span>';
    element.style.display = 'block';
    let i = 0;
    const span = document.createElement('span');
    element.insertBefore(span, element.querySelector('.cursor'));

    function type() {
      if (i < text.length) {
        span.textContent += text.charAt(i);
        i++;
        setTimeout(type, speed + Math.random() * 30);
      } else {
        isTyping = false;
        element.querySelector('.cursor')?.remove();
        resolve();
      }
    }
    type();
  });
}

// ==================== 生成赞美 ====================
async function generatePraise() {
  if (isTyping) return;

  const input = document.getElementById('sceneInput').value.trim();
  if (!input) {
    alert('请先描述你当前所处的环境~');
    return;
  }

  const scene = detectScene(input);
  const template = getTemplate(scene, currentMood, currentStyle);

  // 显示加载
  const outputArea = document.getElementById('outputArea');
  const placeholder = document.getElementById('outputPlaceholder');
  const outputText = document.getElementById('outputText');
  const actionRow = document.getElementById('actionRow');

  placeholder.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  outputText.style.display = 'none';
  actionRow.style.display = 'none';
  outputArea.classList.remove('has-result');

  // 模拟生成延迟
  await new Promise(r => setTimeout(r, 1200));

  placeholder.style.display = 'none';
  const text = template || '此处风景独好，愿你心有诗意，眼有光芒。';
  await typeWriter(text, outputText, currentStyle === '一段话' ? 35 : 55);

  actionRow.style.display = 'flex';
  outputArea.classList.add('has-result');
}

// 生成按钮 + 水波纹
document.getElementById('generateBtn').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  this.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
  generatePraise();
});

// 复制
document.getElementById('copyBtn').addEventListener('click', function(e) {
  const text = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    this.textContent = '已复制';
    setTimeout(() => this.textContent = '复制', 1500);
  });
  // 水波纹
  const rect = this.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = '60px';
  ripple.style.left = (e.clientX - rect.left - 30) + 'px';
  ripple.style.top = (e.clientY - rect.top - 30) + 'px';
  this.style.position = 'relative';
  this.style.overflow = 'hidden';
  this.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
});

// 重新生成
document.getElementById('regenBtn').addEventListener('click', e => {
  const btn = e.target.closest('.action-btn');
  if (btn) {
    const rect = btn.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.width = ripple.style.height = '60px';

    ripple.style.top = (e.clientY - rect.top - 30) + 'px';
    btn.style.position = 'relative';
    btn.style.overflow = 'hidden';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);

// ==================== 视差效果 ====================
document.addEventListener('mousemove', e => {

  const y = (e.clientY / window.innerHeight - 0.5) * 2;

  document.querySelectorAll('.parallax-layer').forEach(layer => {
    const speed = parseFloat(layer.dataset.speed) || 0.02;
    layer.style.transform = `translate(${x * speed * 100}px, ${y * speed * 50}px)`;
  });

  document.getElementById('celestial').style.transform =
    `translate(${x * 8}px, ${y * 5}px)`;
});

// ==================== 鼠标拖尾 ====================
let lastTrail = 0;
document.addEventListener('mousemove', e => {
  const now = Date.now();
  if (now - lastTrail < 40) return;
  lastTrail = now;

  const dot = document.createElement('div');

  const size = 4 + Math.random() * 8;

  dot.style.background = colors[Math.floor(Math.random() * colors.length)];
  dot.style.boxShadow = `0 0 ${size * 2}px ${dot.style.background}`;

  document.getElementById('trailContainer').appendChild(dot);
  setTimeout(() => dot.remove(), 1500);
});

// ==================== Canvas 粒子系统 ====================
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let mouseX = 0, mouseY = 0;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.size = isNight ? 2 + Math.random() * 4 : 1.5 + Math.random() * 2.5;
    this.life = Math.random() * 100;
    this.maxLife = 100 + Math.random() * 100;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life++;

    // 鼠标排斥
    const dx = this.x - mouseX;
    const dy = this.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 150 && dist > 0) {
      const force = (150 - dist) / 150 * 0.8;
      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;
    }

    // 阻尼
    this.vx *= 0.98;
    this.vy *= 0.98;

    // 边界
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height || this.life > this.maxLife) {
      this.reset();
    }
  }
  draw() {
    const alpha = Math.sin((this.life / this.maxLife) * Math.PI) * 0.7;
    const colors = isNight
      ? [`rgba(163,230,53,${alpha})`, `rgba(192,132,252,${alpha})`]
      : [`rgba(255,215,100,${alpha})`, `rgba(251,146,60,${alpha})`];
    const color = colors[Math.floor(Math.random() * colors.length)];

    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // 光晕
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
    glow.addColorStop(0, color.replace(/[\d.]+\)$/, '0.3)'));
    glow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }
}

function initParticles() {
  const count = isNight ? 70 : 50;
  particles = [];
  for (let i = 0; i < count; i++) {
    particles.push(new Particle());
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();

// ==================== 星星生成 ====================
function createStars() {
  const container = document.getElementById('stars');
  container.innerHTML = '';
  for (let i = 0; i < 30; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 60 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (2 + Math.random() * 3) + 's';
    container.appendChild(star);
  }
}
createStars();
